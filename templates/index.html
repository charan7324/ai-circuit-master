<!DOCTYPE html>
<html>
<head>
    <title>AI Circuit Master</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #eceff1; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 60px; margin-bottom: 10px; padding: 10px; }
        .btn { background: #1a73e8; color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; }
        img { width: 100%; margin-top: 20px; border: 2px solid #333; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌌 AI Circuit Master (LaTeX)</h1>
        <form method="POST" enctype="multipart/form-data">
            <textarea name="prompt" placeholder="Describe a circuit..."></textarea>
            <p>Or upload a drawing:</p>
            <input type="file" name="circuit_image" accept="image/*"><br><br>
            <button type="submit" class="btn">Generate Professional Schematic</button>
        </form>

        {% if image_url %}
        <div style="margin-top:20px;">
            <h3>AI Engineering Analysis:</h3>
            <p style="color:#555; background:#f9f9f9; padding:10px;">{{ reasoning }}</p>
            <img src="{{ image_url }}">
        </div>
        {% endif %}
    </div>
</body>
</html>
